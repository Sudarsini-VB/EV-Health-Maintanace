<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EV Guardian — Fleet Intelligence</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #10141A;
            color: #E8E6E0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        h1 { margin-bottom: 20px; font-size: 28px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card {
            background: #161B22;
            border: 1px solid #2A323D;
            border-radius: 8px;
            padding: 20px;
        }
        .card h3 { color: #F2A93B; margin-bottom: 10px; font-size: 14px; text-transform: uppercase; }
        .card .value { font-size: 32px; font-weight: 700; color: #3FC1C9; }
        .card .label { font-size: 13px; color: #677080; margin-top: 5px; }
        .error { background: #4A271F; color: #E2533D; padding: 12px; border-radius: 4px; margin-bottom: 20px; }
        .success { background: #1E5E61; color: #3FC1C9; padding: 12px; border-radius: 4px; margin-bottom: 20px; }
        .loading { color: #9CA5B0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔋 EV Guardian — Fleet Intelligence</h1>
        <div id="status"></div>
        <div id="data" class="grid"></div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000';

        async function loadData() {
            const statusDiv = document.getElementById('status');
            const dataDiv = document.getElementById('data');

            try {
                statusDiv.innerHTML = '<div class="loading">Loading fleet data...</div>';

                const [summary, rankings, regions, metrics] = await Promise.all([
                    fetch(`${API_BASE}/api/fleet/summary`).then(r => r.json()),
                    fetch(`${API_BASE}/api/fleet/rankings?order=worst`).then(r => r.json()),
                    fetch(`${API_BASE}/api/fleet/region-comparison`).then(r => r.json()),
                    fetch(`${API_BASE}/api/predict/model-metrics`).then(r => r.json()),
                ]);

                statusDiv.innerHTML = '<div class="success">✓ Connected to API successfully</div>';

                // Display summary stats
                const cards = [
                    { label: 'Fleet Size', value: summary.total_vehicles, unit: 'vehicles' },
                    { label: 'Avg Capacity', value: summary.avg_capacity_pct.toFixed(1), unit: '%' },
                    { label: 'Open Alerts', value: summary.open_alerts, unit: 'alerts' },
                    { label: 'Due Maintenance', value: summary.vehicles_due_maintenance, unit: 'vehicles' },
                    { label: 'Healthy', value: summary.healthy_count, unit: 'vehicles' },
                    { label: 'Moderate', value: summary.moderate_count, unit: 'vehicles' },
                    { label: 'Degraded', value: summary.degraded_count, unit: 'vehicles' },
                    { label: 'Critical', value: summary.critical_count, unit: 'vehicles' },
                ];

                dataDiv.innerHTML = cards.map(card => `
                    <div class="card">
                        <h3>${card.label}</h3>
                        <div class="value">${card.value}</div>
                        <div class="label">${card.unit}</div>
                    </div>
                `).join('');

            } catch (err) {
                statusDiv.innerHTML = `<div class="error">✗ Error: ${err.message}<br/>Make sure the API server is running at ${API_BASE}</div>`;
                dataDiv.innerHTML = '';
            }
        }

        loadData();
        setInterval(loadData, 10000); // Refresh every 10s
    </script>
</body>
</html>
